name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  check-cross-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cross-reference checks
        run: ./scripts/check-cross-refs.sh

  deploy-functions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Lint
        run: npm run lint
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore:rules --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud-sql/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cloud-sql/api

      - name: Lint
        run: npx eslint src/
        working-directory: cloud-sql/api

      - name: Test
        run: npm test
        working-directory: cloud-sql/api

      - name: Build
        run: npm run build
        working-directory: cloud-sql/api

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: peaks-api
          region: us-central1
          source: cloud-sql/api
          # Pin all required env vars and secrets so deploys can never drop them
          env_vars: |
            INSTANCE_CONNECTION_NAME=donner-a8608:us-central1:peaks-db
            DB_NAME=peaks
            DB_USER=peaks-api
          secrets: |
            DB_PASS=peaks-db-password:latest
            SLACK_WEBHOOK_URL=SLACK_WEBHOOK_URL:latest

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe peaks-api --region=us-central1 --format="value(status.url)")
          echo "Service URL: $URL"

          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed"

          # Database connectivity check — /api/* requires auth so a 401 means
          # the app booted and connected to the DB. A 503 means DB is unreachable.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/lists")
          if [ "$STATUS" = "503" ]; then
            echo "::error::Database connectivity check failed — got 503 (service crash, likely missing DB_PASS)"
            gcloud logging read 'resource.type="cloud_run_revision" AND resource.labels.service_name="peaks-api" AND severity>=ERROR' --limit=5 --format="table(timestamp, textPayload)"
            exit 1
          fi
          echo "Database connectivity check passed (HTTP $STATUS)"
